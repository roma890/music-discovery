<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #08070a;
      --surface:       #0f0d13;
      --surface2:      #141219;
      --border:        #1e1b26;
      --border-hover:  #3a3450;
      --accent:        #f59e0b;
      --accent-light:  #fcd34d;
      --accent-glow:   rgba(245,158,11,0.18);
      --text:          #ede9e3;
      --text-muted:    #7a7268;
      --text-dim:      #3d3a38;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
      overflow-x: hidden;
    }

    /* ── Album art background ── */
    #bg-grid {
      position: fixed;
      inset: -4px;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      grid-auto-rows: 180px;
      gap: 3px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 2s ease;
      pointer-events: none;
    }

    #bg-grid.visible { opacity: 1; }

    .art-cell {
      background-size: cover;
      background-position: center;
      background-color: #111;
      filter: blur(1px) saturate(0.55) brightness(0.6);
    }

    /* two-layer overlay: subtle vignette + base dark */
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(8,7,10,0.4) 0%, rgba(8,7,10,0.78) 100%);
      pointer-events: none;
    }

    /* all real content sits above overlays */
    header, .search-wrap, #loading, #results, .error-box { position: relative; z-index: 2; }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 52px 0 36px;
    }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.75;
      margin-bottom: 12px;
      display: block;
    }

    header h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      background: linear-gradient(150deg, #fef3c7 0%, var(--accent-light) 40%, var(--accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    /* ── Search ── */
    .search-wrap {
      width: 100%;
      max-width: 620px;
    }

    .textarea-shell {
      background: rgba(15,13,19,0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .textarea-shell:focus-within {
      border-color: #92640a;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.14), 0 0 40px rgba(245,158,11,0.06);
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      padding: 18px 20px 50px;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    textarea::placeholder { color: var(--text-dim); }

    .textarea-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 12px;
    }

    .hint { font-size: 0.7rem; color: var(--text-dim); }

    .discover-btn {
      background: linear-gradient(135deg, #d97706, var(--accent), #fbbf24);
      background-size: 200% 200%;
      animation: shimmer 4s ease infinite;
      color: #1a0f00;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-size: 0.86rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.15s;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .discover-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .discover-btn:active { transform: scale(0.97); }
    .discover-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Loading ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-top: 52px;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
    }

    .wv {
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(to top, #d97706, var(--accent-light));
      animation: waveAnim 1.35s ease-in-out infinite;
    }

    .wv:nth-child(1)  { animation-delay: 0.00s; }
    .wv:nth-child(2)  { animation-delay: 0.09s; }
    .wv:nth-child(3)  { animation-delay: 0.18s; }
    .wv:nth-child(4)  { animation-delay: 0.27s; }
    .wv:nth-child(5)  { animation-delay: 0.36s; }
    .wv:nth-child(6)  { animation-delay: 0.45s; }
    .wv:nth-child(7)  { animation-delay: 0.54s; }
    .wv:nth-child(8)  { animation-delay: 0.45s; }
    .wv:nth-child(9)  { animation-delay: 0.36s; }
    .wv:nth-child(10) { animation-delay: 0.27s; }
    .wv:nth-child(11) { animation-delay: 0.18s; }
    .wv:nth-child(12) { animation-delay: 0.09s; }
    .wv:nth-child(13) { animation-delay: 0.00s; }

    @keyframes waveAnim {
      0%, 100% { height: 5px;  opacity: 0.25; }
      50%       { height: 44px; opacity: 1; }
    }

    .steps {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-dim);
      transition: color 0.3s;
    }

    .step.active { color: var(--accent-light); }
    .step.done   { color: var(--text-muted); }

    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .step.active .step-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .step.done .step-dot { background: var(--text-muted); }
    .step-line { width: 36px; height: 1px; background: var(--border); }

    /* ── Results ── */
    #results {
      display: none;
      width: 100%;
      max-width: 620px;
      margin-top: 44px;
    }

    .vibe-pill {
      display: inline-block;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.22);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.74rem;
      color: var(--accent-light);
      margin-bottom: 16px;
      font-weight: 500;
      font-style: italic;
      opacity: 0.9;
    }

    .playlist-name {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.15;
      background: linear-gradient(150deg, #fef3c7, var(--accent-light) 55%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .vibe-summary {
      color: var(--text-muted);
      font-size: 0.87rem;
      line-height: 1.6;
      max-width: 500px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 14px;
    }

    .tag {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: lowercase;
    }

    .results-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 22px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .track-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 7px;
      padding: 5px 13px;
      font-size: 0.73rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .copy-btn:hover { border-color: #92640a; color: var(--accent-light); }

    /* ── Track cards ── */
    #track-list { display: flex; flex-direction: column; gap: 6px; }

    .track {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 15px 18px;
      background: rgba(20,18,25,0.85);
      border: 1px solid var(--border);
      border-left: 2px solid transparent;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(12px);
      backdrop-filter: blur(8px);
      animation: slideUp 0.4s ease forwards;
      transition: border-color 0.2s, border-left-color 0.2s, background 0.2s;
    }

    .track:hover {
      border-color: var(--border-hover);
      border-left-color: var(--accent);
      background: rgba(30,26,35,0.9);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .track-num {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      min-width: 20px;
      text-align: right;
      padding-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .track-body { flex: 1; min-width: 0; }

    .track-top {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
    }

    .track-title {
      font-weight: 600;
      font-size: 0.93rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .track-sep { color: var(--text-dim); font-size: 0.78rem; }

    .track-artist {
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--accent);
    }

    .track-meta {
      margin-top: 2px;
      font-size: 0.76rem;
      color: var(--text-dim);
    }

    .track-explanation {
      margin-top: 8px;
      font-size: 0.82rem;
      line-height: 1.65;
      color: #706860;
    }

    /* ── Play button ── */
    .play-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .play-btn.ready {
      opacity: 1;
      pointer-events: auto;
    }

    .play-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245,158,11,0.08);
    }

    .play-btn.playing {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245,158,11,0.12);
      box-shadow: 0 0 14px rgba(245,158,11,0.22);
    }

    .play-icon  { display: block; }
    .pause-icon { display: none; }
    .play-btn.playing .play-icon  { display: none; }
    .play-btn.playing .pause-icon { display: block; }

    .play-btn.no-preview {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .play-btn.no-preview:hover {
      border-color: var(--border);
      color: var(--text-dim);
      background: transparent;
    }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 0.86rem;
      margin-top: 28px;
      width: 100%;
      max-width: 620px;
      line-height: 1.5;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- Album art background -->
  <div id="bg-grid"></div>
  <div id="bg-overlay"></div>

  <header>
    <span class="eyebrow">AI Music Discovery</span>
    <h1>Find the sound<br>of any feeling</h1>
    <p>describe a vibe &nbsp;·&nbsp; get the perfect playlist</p>
  </header>

  <div class="search-wrap">
    <div class="textarea-shell">
      <textarea id="vibe-input" rows="3"
        placeholder="songs that feel like driving through NYC at 2am..."></textarea>
      <div class="textarea-footer">
        <span class="hint">⌘ Enter to discover</span>
        <button class="discover-btn" id="discover-btn">Discover →</button>
      </div>
    </div>
  </div>

  <div id="loading">
    <div class="waveform">
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div>
    </div>
    <div class="steps">
      <div class="step active" id="step-1"><div class="step-dot"></div><span id="step-label">Discovering your playlist...</span></div>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="results">
    <div class="vibe-pill" id="vibe-pill"></div>
    <div class="playlist-name" id="playlist-name"></div>
    <div class="vibe-summary"  id="vibe-summary"></div>
    <div class="tags" id="tags"></div>
    <div class="results-meta">
      <span class="track-count">10 tracks</span>
      <button class="copy-btn" id="copy-btn">Copy playlist</button>
    </div>
    <div id="track-list"></div>
  </div>

  <script>
    const btn      = document.getElementById('discover-btn');
    const input    = document.getElementById('vibe-input');
    const loading  = document.getElementById('loading');
    const results  = document.getElementById('results');
    const errorBox = document.getElementById('error-box');
    const stepLabel = document.getElementById('step-label');
    const copyBtn   = document.getElementById('copy-btn');
    const bgGrid   = document.getElementById('bg-grid');

    let lastTracks   = [];
    let submittedVibe = '';

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) discover();
    });
    btn.addEventListener('click', discover);

    copyBtn.addEventListener('click', () => {
      const text = lastTracks
        .map((t, i) => `${i+1}. ${t.title} — ${t.artist}${t.album ? ` (${t.album}${t.year ? ', '+t.year : ''})` : ''}`)
        .join('\n');
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy playlist', 2000);
      });
    });

    async function discover() {
      const vibe = input.value.trim();
      if (!vibe) return;

      submittedVibe = vibe;
      btn.disabled = true;
      results.style.display = 'none';
      errorBox.style.display = 'none';
      loading.style.display  = 'flex';

      try {
        const res = await fetch('/discover', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vibe }),
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) handleEvent(JSON.parse(line.slice(6)));
          }
        }
      } catch (err) {
        showError('Connection error: ' + err.message);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function handleEvent(data) {
      if (data.type === 'status') {
        stepLabel.textContent = data.msg;
      }

      if (data.type === 'done') {
        document.getElementById('vibe-pill').textContent     = `"${submittedVibe}"`;
        document.getElementById('playlist-name').textContent = data.playlist_name;
        document.getElementById('vibe-summary').textContent  = data.vibe_summary;

        const tagsEl = document.getElementById('tags');
        tagsEl.innerHTML = '';
        [...(data.genres || []), ...(data.mood || [])].slice(0, 8).forEach(t => {
          const el = document.createElement('span');
          el.className = 'tag';
          el.textContent = t;
          tagsEl.appendChild(el);
        });

        lastTracks = data.tracks;
        renderTracks(data.tracks);
        loading.style.display = 'none';
        results.style.display = 'block';
        loadItunesData(data.tracks);
      }

      if (data.type === 'error') showError(data.msg);
    }

    function renderTracks(tracks) {
      const list = document.getElementById('track-list');
      list.innerHTML = '';
      tracks.forEach((t, i) => {
        const el = document.createElement('div');
        el.className = 'track';
        el.style.animationDelay = `${i * 60}ms`;
        const albumLine = [t.album, t.year].filter(Boolean).join(' · ');
        el.innerHTML = `
          <div class="track-num">${String(i+1).padStart(2,'0')}</div>
          <div class="track-body">
            <div class="track-top">
              <span class="track-title">${esc(t.title)}</span>
              <span class="track-sep">—</span>
              <span class="track-artist">${esc(t.artist)}</span>
            </div>
            ${albumLine ? `<div class="track-meta">${esc(albumLine)}</div>` : ''}
            <div class="track-explanation">${esc(t.explanation)}</div>
          </div>
          <button class="play-btn" aria-label="Play 30s preview">
            <span class="play-icon">▶</span>
            <span class="pause-icon">⏸</span>
          </button>`;
        list.appendChild(el);
      });
    }

    // ── Audio playback ──
    let currentAudio = null;
    let currentBtn   = null;

    function togglePlay(btn) {
      const url = btn.dataset.preview;
      if (!url) return;

      if (currentBtn === btn) {
        // Same track — toggle pause/resume
        if (currentAudio.paused) {
          currentAudio.play();
          btn.classList.add('playing');
        } else {
          currentAudio.pause();
          btn.classList.remove('playing');
        }
        return;
      }

      // Stop whatever was playing
      if (currentAudio) {
        currentAudio.pause();
        if (currentBtn) currentBtn.classList.remove('playing');
      }

      currentAudio = new Audio(url);
      currentBtn   = btn;
      btn.classList.add('playing');
      currentAudio.play();
      currentAudio.addEventListener('ended', () => {
        btn.classList.remove('playing');
        currentAudio = null;
        currentBtn   = null;
      });
    }

    async function fetchItunesTrack(title, artist) {
      // Try progressively looser queries until we get a preview URL
      const queries = [
        `${artist} ${title}`,
        `${title} ${artist}`,
        title,
      ];
      for (const q of queries) {
        try {
          const res = await fetch(
            `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=5&media=music`
          );
          const d = await res.json();
          if (!d.results?.length) continue;
          // Prefer exact title match, then fall back to first result
          const match =
            d.results.find(r => r.trackName?.toLowerCase() === title.toLowerCase()) ||
            d.results[0];
          if (match) {
            return {
              artUrl:     match.artworkUrl100?.replace('100x100bb', '400x400bb') ?? null,
              previewUrl: match.previewUrl ?? null,
            };
          }
        } catch {}
      }
      return { artUrl: null, previewUrl: null };
    }

    async function loadItunesData(tracks) {
      const cards = document.querySelectorAll('.track');

      // Fetch all tracks in parallel
      const results = await Promise.all(tracks.map(t => fetchItunesTrack(t.title, t.artist)));

      // Wire up play buttons
      results.forEach((r, i) => {
        if (!cards[i]) return;
        const btn = cards[i].querySelector('.play-btn');
        btn.classList.add('ready');
        if (r.previewUrl) {
          btn.dataset.preview = r.previewUrl;
          btn.addEventListener('click', e => { e.stopPropagation(); togglePlay(btn); });
        } else {
          btn.classList.add('no-preview');
          btn.title = 'No preview available';
        }
      });

      // Build background art grid
      const artUrls = results.map(r => r.artUrl).filter(Boolean);
      if (!artUrls.length) return;
      bgGrid.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const cell = document.createElement('div');
        cell.className = 'art-cell';
        cell.style.backgroundImage = `url(${artUrls[i % artUrls.length]})`;
        bgGrid.appendChild(cell);
      }
      bgGrid.classList.add('visible');
    }

    function showError(msg) {
      errorBox.textContent   = msg;
      errorBox.style.display = 'block';
      loading.style.display  = 'none';
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
